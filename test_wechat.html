<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>测试按钮</title>
    <style>
        body {
            padding: 50px 20px;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .btn {
            width: 100%;
            padding: 20px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .btn:active {
            background: #1557b0;
        }
        .log {
            margin-top: 30px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 14px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <h2>微信按钮测试</h2>
    
    <button id="btn1" class="btn">测试1: onclick属性</button>
    <br><br>
    <button id="btn2" class="btn">测试2: addEventListener</button>
    <br><br>
    <a href="#" id="btn3" class="btn" style="display:block;text-align:center;text-decoration:none;">测试3: a标签</a>
    
    <div class="log" id="log">点击按钮查看结果...</div>
    
    <script>
        function log(msg) {
            document.getElementById('log').innerHTML = msg;
            console.log(msg);
        }
        
        // 测试1: onclick属性
        function test1() {
            log('测试1: onclick 被触发!');
        }
        
        // 测试2: addEventListener
        document.getElementById('btn2').addEventListener('click', function() {
            log('测试2: addEventListener 被触发!');
        });
        
        // 测试3: a标签
        document.getElementById('btn3').addEventListener('click', function(e) {
            e.preventDefault();
            log('测试3: a标签 click 被触发!');
        });
        
        log('页面加载完成');
    </script>
</body>
</html>
